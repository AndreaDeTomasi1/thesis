name: Build Typst PDF

on:
  push:
    branches:
      - master
    paths-ignore:
      - "main_en.typ"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Typst
        run: |
          curl -L https://typst.app/install.sh | bash
          echo "$HOME/.typst/bin" >> $GITHUB_PATH

      - name: Build PDF Italian
        run: typst compile main.typ main.pdf

      - name: Upload Italian PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf-italian
          path: main.pdf

      - name: Translate to English
        run: python translate_typst.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Build PDF English
        run: typst compile main_en.typ main_en.pdf

      - name: Upload English PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf-english
          path: main_en.pdf