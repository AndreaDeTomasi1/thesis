name: Build Typst PDF

on:
  push:
    branches:
      - master
    paths-ignore:
      - "main_en.typ"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Typst
        run: |
          curl -fsSL https://install.typst.community/install.sh | sh
          echo "$HOME/.typst/bin" >> $GITHUB_PATH

      - name: Build PDF Italian
        run: typst compile main.typ main.pdf

      - name: Upload Italian PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf-italian
          path: main.pdf

      # - name: Translate to English
      #   run: python translate_typst.py
      #   env:
      #     OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # - name: Commit translated Typst
      #   run: |
      #     git config --global user.name "github-actions"
      #     git config --global user.email "actions@github.com"
      #     git add main_en.typ
      #     if ! git diff --cached --quiet; then
      #       git commit -m "Auto-translate Typst to English"
      #       git push
      #     fi

      - name: Build PDF English
        run: typst compile main_en.typ main_en.pdf

      - name: Upload English PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf-english
          path: main_en.pdf